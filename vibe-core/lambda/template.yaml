            KeyType: HASH
          - AttributeName: reportId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: reportId-index
            KeySchema:
              - AttributeName: reportId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: customer_id-createdAt-index
            KeySchema:
              - AttributeName: customer_id
                KeyType: HASH
