        - Key: Application
          Value: ProviderManager


  CustomerLicenseHistoryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "CustomerLicenseHistory"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: history_key
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: effective_date
          AttributeType: S
        - AttributeName: end_date
          AttributeType: S
      KeySchema:
        - AttributeName: history_key
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: customer_id-effective_date-index
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
            - AttributeName: effective_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: customer_id-end_date-index
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
            - AttributeName: end_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: ProviderManager




  UserTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "User"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_key
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: user_name
          AttributeType: S
        - AttributeName: user_email
          AttributeType: S
      KeySchema:
        - AttributeName: user_key
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: customer_id-user_name-index
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
            - AttributeName: user_name
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: user_email-index
          KeySchema:
            - AttributeName: user_email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Application
          Value: ProviderManager

 
  #  UserRole Table:
  # PK: user_key (HASH) + role_key (RANGE)
  # GSI: role_key-index  — used by delete_role to check if a role is in use
  # GSI: customer_id-index — used by admins to list all assignments for their tenant
  UserRoleTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "UserRole"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_key
          AttributeType: S
        - AttributeName: role_key
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_key
          KeyType: HASH
        - AttributeName: role_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: role_key-index
          KeySchema:
            - AttributeName: role_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: customer_id-index
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Application
          Value: ProviderManager
  
 
  # PK: user_key (HASH) + feature_key (RANGE)
  # GSI: feature_key-index — used by delete_feature to check if a feature is in use
  # GSI: customer_id-index — used by admins to list all assignments for their tenant
  UserFeatureTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "UserFeature"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_key
          AttributeType: S
        - AttributeName: feature_key
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_key
          KeyType: HASH
        - AttributeName: feature_key
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: feature_key-index
          KeySchema:
            - AttributeName: feature_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: customer_id-index
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Application
          Value: ProviderManager

  PaymentProcessorConfigTable:
