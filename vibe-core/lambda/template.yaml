            Path: /customers/{customer_id}/notifications
            Method: POST


  EventLoggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: "event-logger"
      CodeUri: src/notifications/
      Handler: event_logger.lambda_handler
      Runtime: python3.13
      # Stream batches can be large; 60 seconds is safe for analytics writes
      Timeout: 60
      Layers:
        - !Ref UtilsLayer
      Policies:
        # Write events to EventsLog
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsLogTable
        # Read webhook configs to fan out notifications
        - DynamoDBReadPolicy:
            TableName: !Ref WebhookEventTable
        # CloudWatch custom metrics
        - Statement:
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: "*"
        # SQS for webhook fan-out (queue URL supplied via env var)
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: "*"
        # Read permissions on all source table streams
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:DescribeStream
                - dynamodb:ListStreams
              Resource:
                - !GetAtt CustomersTable.StreamArn
                - !GetAtt UserTable.StreamArn
                - !GetAtt PaymentTransactionTable.StreamArn
                - !GetAtt DisputeTable.StreamArn
      Environment:
        Variables:
          JWT_SECRET_NAME: 'vfeVer1/jwt-access-secret'   # TODO: remove when Secrets Manager is wired up
          EVENTS_LOG_TABLE:   !Ref EventsLogTable
          WEBHOOK_EVENT_TABLE: !Ref WebhookEventTable
          WEBHOOK_QUEUE_URL:  !Sub "https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/provider-manager-webhooks"
          LOG_LEVEL:          "INFO"
      # ── DynamoDB Stream triggers ────────────────────────────────────────
      # Each source table gets its own named event. SAM creates a separate
      # EventSourceMapping for each, so failures on one table do not block
      # processing for the others.
      Events:
        CustomersStream:
          Type: DynamoDB
          Properties:
            Stream:           !GetAtt CustomersTable.StreamArn
            StartingPosition: LATEST
            BatchSize:        10
            # Skip records that fail after 2 retries so one bad record
            # cannot permanently stall the shard.
            MaximumRetryAttempts: 2
            BisectBatchOnFunctionError: true

        UserStream:
          Type: DynamoDB
          Properties:
            Stream:           !GetAtt UserTable.StreamArn
            StartingPosition: LATEST
            BatchSize:        10
            MaximumRetryAttempts: 2
            BisectBatchOnFunctionError: true

        PaymentTransactionStream:
          Type: DynamoDB
          Properties:
            Stream:           !GetAtt PaymentTransactionTable.StreamArn
            StartingPosition: LATEST
            BatchSize:        10
            MaximumRetryAttempts: 2
            BisectBatchOnFunctionError: true

        DisputeStream:
          Type: DynamoDB
          Properties:
            Stream:           !GetAtt DisputeTable.StreamArn
            StartingPosition: LATEST
            BatchSize:        10
            MaximumRetryAttempts: 2
            BisectBatchOnFunctionError: true


