        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Application
          Value: ProviderManager
        - Key: Environment
          Value: !Ref Environment

  # ==========================================
  # API CALL TRACKING TABLE
  # ==========================================

  ApiCallTrackingTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "ApiCallTracking"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: timestamp_request_id
          AttributeType: S
        - AttributeName: user_key
          AttributeType: S
        - AttributeName: http_path
          AttributeType: S
        - AttributeName: function_name
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
        - AttributeName: timestamp_request_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user_key-timestamp_request_id-index
          KeySchema:
            - AttributeName: user_key
              KeyType: HASH
            - AttributeName: timestamp_request_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: http_path-timestamp_request_id-index
          KeySchema:
            - AttributeName: http_path
              KeyType: HASH
            - AttributeName: timestamp_request_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: function_name-timestamp_request_id-index
          KeySchema:
            - AttributeName: function_name
              KeyType: HASH
            - AttributeName: timestamp_request_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: ProviderManager
        - Key: Environment
          Value: !Ref Environment


  UtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
