            Value: ProviderManager

 
   # ==============================================
  # EMAIL VERIFICATION CODE TABLE
  # ==============================================
  EmailVerificationCodesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
