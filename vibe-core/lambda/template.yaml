AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Provider Manager - SaaS Application Management System (HTTP API)

###original

Parameters:
  Environment:
    Type: String
    Default: prod

    AllowedValues:
      - dev
      - prod
    Description: Environment name
  CorsOrigin:
    Type: String
    Default: 'http://localhost:3000'
    Description: >
      The exact origin of the React frontend (used in Access-Control-Allow-Origin).
      dev:  http://localhost:3000
      prod: https://your-production-domain.com


###proposed for security

# Parameters:
#   Environment:
#     Type: String
#     Default: dev
#     AllowedValues:
#       - dev
#       - prod
#     Description: Deployment environment — controls cookie SameSite attribute and CORS origin

#   FrontendOrigin:
#     Type: String
#     Default: "http://localhost:3000"
#     Description: >
#       The exact origin of the React frontend (used in Access-Control-Allow-Origin).
#       dev:  http://localhost:3000
#       prod: https://your-production-domain.com



# ###final
# Parameters:
#   Environment:
#     Type: String
#     Default: prod
#     AllowedValues:
#       - dev
#       - prod
#     Description: Environment name

#   CorsOrigin:
#     Type: String
#     Description: CORS origin URL for the application
#     Default: 'http://localhost:3000'
#     dev:  http://localhost:3000
#     prod: https://your-production-domain.com


Globals:
  Function:
    Timeout: 30
    Runtime: python3.13
    Environment:
      Variables:
        JWT_SECRET_NAME: 'vfeVer1/jwt-access-secret'   # TODO: remove when Secrets Manager is wired up
        CORS_ORIGIN: !Ref CorsOrigin
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: INFO
        LOG_API_CALL_FUNCTION: "log-api-call"
    
    

Resources:

  # MyLogGroup:
  #   Type: AWS::Logs::LogGroup
  #   Properties:
  #     LogGroupName: /vibe-core/logs
  #     RetentionInDays: 7

## ==========================================
  # SNS TOPIC FOR REPORT NOTIFICATIONS
  # ==========================================

  #ReportNotificationTopic:
  #  Type: AWS::SNS::Topic
  #  Properties:
  #    TopicName: !Sub "report-notifications"
  #    DisplayName: Report Notifications
  #    Tags:
  #      - Key: Application
  #        Value: ProviderManager


  # DynamoDB Table
  CustomersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Customers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: customer_name
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CustomerIndex
          KeySchema:
            - AttributeName: customer_name
              KeyType: HASH
            - AttributeName: customer_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # DynamoDB Tables  usage and auth
  UsageTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: UsageTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: company_name
          AttributeType: S
        - AttributeName: app_name
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: user_name
          AttributeType: S
      KeySchema:
        - AttributeName: user_name
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CustomerIndex
          KeySchema:
            - AttributeName: company_name
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: AppIndex
          KeySchema:
            - AttributeName: app_name
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        
 

  # ==========================================
  # DYNAMODB TABLES 
  # ==========================================

  RefreshTokensTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "RefreshTokens"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_id
          AttributeType: S
        - AttributeName: user_key
          AttributeType: S
      KeySchema:
        - AttributeName: token_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user_key-index
          KeySchema:
            - AttributeName: user_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at    # DynamoDB auto-purges expired tokens — no housekeeping needed
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProviderManager
        - Key: Environment
          Value: !Ref Environment



  
  RoleTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "Role"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: role_key
          AttributeType: S
        - AttributeName: role_desc
          AttributeType: S
      KeySchema:
        - AttributeName: role_key
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: role_desc-index
          KeySchema:
            - AttributeName: role_desc
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProviderManager

  FeatureTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "Feature"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: feature_key
          AttributeType: S
        - AttributeName: feature_desc
          AttributeType: S
      KeySchema:
        - AttributeName: feature_key
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: feature_desc-index
          KeySchema:
            - AttributeName: feature_desc
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ProviderManager

  LicenseTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: "License"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: license_key
          AttributeType: S
        - AttributeName: license_type
          AttributeType: S
        - AttributeName: is_active_str
          AttributeType: S
      KeySchema:
